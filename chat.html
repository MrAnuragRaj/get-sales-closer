<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Chat with Our AI Assistant</title>
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ───────────────────────────────────────────────────── */
        #chat-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        #agent-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700; color: white; flex-shrink: 0;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.3);
        }
        #agent-info { flex: 1; min-width: 0; }
        #agent-name { font-size: 15px; font-weight: 700; color: white; }
        #agent-status {
            font-size: 11px; color: #22c55e;
            display: flex; align-items: center; gap: 5px; margin-top: 1px;
        }
        #agent-status::before {
            content: ''; width: 6px; height: 6px;
            background: #22c55e; border-radius: 50%; display: inline-block;
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0%, 100% { opacity: 1; } 50% { opacity: 0.5; }
        }
        #header-logo {
            font-size: 10px; color: #475569; text-align: right;
            line-height: 1.3;
        }
        #header-logo a { color: #6366f1; text-decoration: none; }

        /* ── Messages ─────────────────────────────────────────────────── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            -webkit-overflow-scrolling: touch;
        }
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

        .msg-row { display: flex; align-items: flex-end; gap: 8px; }
        .msg-row.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; color: white;
        }
        .msg-avatar.user-av { background: linear-gradient(135deg, #0ea5e9, #2563eb); }

        .msg-bubble {
            max-width: 72%;
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.55;
            word-wrap: break-word;
        }
        .msg-row.ai  .msg-bubble { background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 4px; }
        .msg-row.user .msg-bubble { background: #4f46e5; color: white; border-bottom-right-radius: 4px; }

        .msg-time { font-size: 10px; color: #475569; margin-top: 4px; padding: 0 6px; }
        .msg-row.user .msg-time { text-align: right; }

        /* Typing indicator */
        .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
        .typing-dots span {
            width: 7px; height: 7px; background: #64748b; border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* ── Input Area ───────────────────────────────────────────────── */
        #input-area {
            border-top: 1px solid rgba(255,255,255,0.07);
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: #0f172a;
            flex-shrink: 0;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }
        #msg-input {
            flex: 1;
            background: #1e293b;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 11px 14px;
            color: white;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            resize: none;
            outline: none;
            max-height: 120px;
            line-height: 1.5;
            transition: border-color 0.15s;
        }
        #msg-input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
        #msg-input::placeholder { color: #475569; }
        #send-btn {
            width: 42px; height: 42px; border-radius: 12px;
            background: #4f46e5; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, transform 0.1s;
            flex-shrink: 0;
        }
        #send-btn:hover:not(:disabled) { background: #6366f1; transform: scale(1.05); }
        #send-btn:disabled { background: #334155; cursor: not-allowed; transform: none; }
        #send-btn svg { width: 18px; height: 18px; fill: white; }

        /* ── Error / Loading State ────────────────────────────────────── */
        #loading-overlay {
            position: fixed; inset: 0; background: #0f172a;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px; z-index: 100;
        }
        #loading-overlay.hidden { display: none; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(99,102,241,0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error-state {
            display: none; text-align: center; padding: 40px 24px;
        }
        #error-state.visible { display: flex; flex-direction: column; align-items: center; gap: 12px; }

        @media (min-width: 640px) {
            body { align-items: center; justify-content: center; background: #020617; }
            .chat-container {
                width: 100%; max-width: 480px; height: 100dvh; max-height: 700px;
                border-radius: 20px; overflow: hidden;
                box-shadow: 0 25px 80px rgba(0,0,0,0.6);
                border: 1px solid rgba(255,255,255,0.07);
                display: flex; flex-direction: column;
            }
        }
        @media (max-width: 639px) {
            .chat-container { height: 100dvh; display: flex; flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Loading overlay -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p style="color:#64748b;font-size:13px;">Connecting to your AI assistant...</p>
    </div>

    <div class="chat-container" id="chat-container" style="display:none;">
        <!-- Header -->
        <div id="chat-header">
            <div id="agent-avatar">AI</div>
            <div id="agent-info">
                <div id="agent-name">AI Assistant</div>
                <div id="agent-status">Online now</div>
            </div>
            <div id="header-logo">
                Powered by<br>
                <a href="https://www.getsalescloser.com" target="_blank" rel="noopener">GetSalesCloser</a>
            </div>
        </div>

        <!-- Error state (shown if org_id missing/invalid) -->
        <div id="error-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="#ef4444"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <p style="color:#e2e8f0;font-weight:600;">Chat unavailable</p>
            <p style="color:#64748b;font-size:13px;max-width:280px;">This chat link appears to be invalid. Please contact the business directly.</p>
        </div>

        <!-- Messages -->
        <div id="messages"></div>

        <!-- Input -->
        <div id="input-area">
            <textarea id="msg-input" placeholder="Type your message..." rows="1"></textarea>
            <button id="send-btn" aria-label="Send message">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script>
    (function () {
        const WIDGET_API = 'https://klbwigcvrdfeeeeotehu.supabase.co/functions/v1/widget_inbound';
        const params  = new URLSearchParams(location.search);
        const ORG_ID  = params.get('org') || params.get('org_id');

        if (!ORG_ID) { showError(); return; }

        const SESSION_KEY = 'gsc_session_' + ORG_ID;
        const HISTORY_KEY = 'gsc_history_' + ORG_ID;

        let sessionId = localStorage.getItem(SESSION_KEY);
        if (!sessionId) {
            sessionId = crypto.randomUUID ? crypto.randomUUID() : ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g,c=>(c^crypto.getRandomValues(new Uint8Array(1))[0]&15>>c/4).toString(16));
            localStorage.setItem(SESSION_KEY, sessionId);
        }

        let history = [];
        try { history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) {}

        let agentInitial = 'AI';
        let isSending    = false;

        function showError() {
            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('messages').style.display = 'none';
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('error-state').classList.add('visible');
        }

        function fmt() { return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }); }

        function appendMsg(role, text, scroll = true) {
            const msgs = document.getElementById('messages');
            const row  = document.createElement('div');
            row.className = 'msg-row ' + role;

            const avEl  = document.createElement('div');
            avEl.className = 'msg-avatar' + (role === 'user' ? ' user-av' : '');
            avEl.textContent = role === 'user' ? 'You' : agentInitial;

            const wrap = document.createElement('div');
            const bub  = document.createElement('div');
            bub.className = 'msg-bubble';
            bub.textContent = text;

            const time = document.createElement('div');
            time.className = 'msg-time';
            time.textContent = fmt();

            wrap.appendChild(bub);
            wrap.appendChild(time);
            row.appendChild(avEl);
            row.appendChild(wrap);
            msgs.appendChild(row);
            if (scroll) msgs.scrollTop = msgs.scrollHeight;
            return row;
        }

        function showTyping() {
            const msgs = document.getElementById('messages');
            const row  = document.createElement('div');
            row.id = 'typing-row';
            row.className = 'msg-row ai';
            row.innerHTML = `<div class="msg-avatar">${agentInitial}</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
            msgs.appendChild(row);
            msgs.scrollTop = msgs.scrollHeight;
        }

        function hideTyping() { document.getElementById('typing-row')?.remove(); }

        function saveHistory() {
            try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch(e) {}
        }

        async function sendMessage(text, hidden = false) {
            if (isSending || !text.trim()) return;
            isSending = true;

            const sendBtn  = document.getElementById('send-btn');
            const inputEl  = document.getElementById('msg-input');
            sendBtn.disabled = true;
            inputEl.disabled = true;

            if (!hidden) {
                appendMsg('user', text);
                history.push({ role: 'user', content: text });
                saveHistory();
            }

            showTyping();

            try {
                const res  = await fetch(WIDGET_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        org_id:     ORG_ID,
                        session_id: sessionId,
                        message:    text,
                        history:    hidden ? [] : history.slice(0, -1),
                    }),
                });
                const data = await res.json();
                hideTyping();

                const reply = data.reply || 'Something went wrong. Please try again.';
                appendMsg('ai', reply);

                // Update agent name/avatar from first response
                if (data.agent_name) {
                    agentInitial = data.agent_name.charAt(0).toUpperCase();
                    document.getElementById('agent-name').textContent   = data.agent_name;
                    document.getElementById('agent-avatar').textContent = data.agent_name.charAt(0).toUpperCase();
                    document.querySelectorAll('.msg-avatar:not(.user-av)').forEach(el => el.textContent = agentInitial);
                }

                if (!hidden) {
                    history.push({ role: 'assistant', content: reply });
                    saveHistory();
                } else {
                    // Greeting: add only the assistant message to history
                    history.push({ role: 'assistant', content: reply });
                    saveHistory();
                }
            } catch(err) {
                hideTyping();
                appendMsg('ai', 'Connection issue. Please check your internet and try again.');
            } finally {
                isSending    = false;
                sendBtn.disabled = false;
                inputEl.disabled = false;
                inputEl.focus();
            }
        }

        // ── Init ────────────────────────────────────────────────────────────────
        async function init() {
            // Fetch agent meta (lightweight, no AI)
            try {
                const meta = await fetch(`${WIDGET_API}?action=meta&org_id=${ORG_ID}`).then(r => r.json());
                if (meta.error) { showError(); return; }
                const name = meta.agent_name || 'Alex';
                agentInitial = name.charAt(0).toUpperCase();
                document.getElementById('agent-name').textContent   = name;
                document.getElementById('agent-avatar').textContent = agentInitial;
                document.title = `Chat with ${name}`;
            } catch(e) { /* non-fatal */ }

            document.getElementById('loading-overlay').classList.add('hidden');
            document.getElementById('chat-container').style.display = 'flex';

            // Render existing history (returning visitor)
            if (history.length > 0) {
                history.forEach(m => appendMsg(m.role === 'user' ? 'user' : 'ai', m.content, false));
                const msgs = document.getElementById('messages');
                msgs.scrollTop = msgs.scrollHeight;
            } else {
                // New visitor: AI generates greeting
                await sendMessage('Hello', true);
            }

            document.getElementById('msg-input').focus();
        }

        init();

        // ── Input handling ──────────────────────────────────────────────────────
        const inputEl = document.getElementById('msg-input');
        const sendEl  = document.getElementById('send-btn');

        function doSend() {
            const text = inputEl.value.trim();
            if (!text) return;
            inputEl.value = '';
            inputEl.style.height = 'auto';
            sendMessage(text);
        }

        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
        });
        inputEl.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        sendEl.addEventListener('click', doSend);
    })();
    </script>
</body>
</html>
