<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Sentinel | GetSalesCloser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 h-screen text-white flex flex-col font-sans overflow-hidden">

    <!-- CRM Profile Modal -->
    <div id="crm-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-40 hidden items-center justify-center p-4" onclick="if(event.target===this)closeCRMProfile()">
        <div class="bg-slate-800 border border-white/10 rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col">
            <div class="flex items-center justify-between p-6 border-b border-white/5">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-id-card text-indigo-400"></i>
                    <span id="modal-name">CRM Profile</span>
                </h2>
                <button onclick="closeCRMProfile()" class="text-slate-500 hover:text-white text-xl transition">&times;</button>
            </div>
            <div class="overflow-y-auto flex-1 p-6 space-y-6" id="modal-body">
                <p class="text-slate-500 text-sm text-center py-6">Loading...</p>
            </div>
        </div>
    </div>

    <div id="auth-loader" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-50">
        <div class="h-10 w-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-3"></div>
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Verifying Session...</p>
    </div>

    <div class="h-16 border-b border-white/5 bg-slate-900 flex items-center justify-between px-8 gap-4">
        <h1 class="text-xl font-bold flex items-center gap-3 shrink-0">
            <i class="fa-solid fa-bolt text-indigo-500"></i> Instant Sentinel
        </h1>
        <div class="flex items-center gap-3 ml-auto">
            <div id="sentinel-sms-balance" class="hidden items-center gap-2 bg-slate-800 rounded-lg px-3 py-1.5 text-sm">
                <i class="fa fa-comment-sms text-indigo-400 text-xs"></i>
                <span id="sentinel-sms-count" class="text-white font-bold">—</span>
                <span class="text-slate-500 text-xs">SMS</span>
                <button onclick="window.Credits.showTopupModal('sms_msg')" class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-2 py-0.5 rounded-md transition ml-1">+ Buy</button>
            </div>
            <a href="dashboard.html" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-lg text-sm transition">
                <i class="fa-solid fa-arrow-left mr-2"></i>Dashboard
            </a>
        </div>
    </div>

    <div class="flex-1 flex overflow-hidden">
        <div class="w-1/3 border-r border-white/5 bg-slate-800/30 flex flex-col">
            <div class="p-6">
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider">Active Leads</h2>
            </div>
            <div class="overflow-y-auto flex-1" id="lead-list-container">
                </div>
        </div>

        <div class="w-2/3 p-8 flex flex-col bg-slate-900 relative">
            <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500">
                <i class="fa-regular fa-hand-pointer text-4xl mb-4 opacity-50"></i>
                <p>Select a lead to view surveillance data.</p>
            </div>

            <div id="detail-view" class="hidden h-full flex-col">
                <div class="flex justify-between items-center mb-6 pb-4 border-b border-white/5">
                    <div>
                        <h2 class="text-2xl font-bold text-white" id="detail-name">Lead Name</h2>
                        <p class="text-xs text-slate-400" id="detail-company">Company Info</p>
                    </div>
                    <button onclick="openCRMProfile()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-4 py-2 rounded shadow-lg transition">View Full CRM Profile</button>
                </div>
                
                <div class="flex-1 bg-slate-950 rounded-xl p-6 overflow-y-auto mb-6 border border-white/5 space-y-4" id="chat-history">
                    </div>

                <div class="p-5 bg-green-500/10 border border-green-500/20 rounded-xl flex justify-between items-center">
                    <div>
                        <span class="block text-green-400 font-bold text-sm mb-1"><i class="fa-solid fa-chart-pie mr-2"></i>Conversion Probability</span>
                        <p class="text-xs text-green-300/70">Calculated based on recent sentiment analysis.</p>
                    </div>
                    <span class="text-3xl font-bold text-white" id="detail-score">0%</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script src="credits.js"></script>
<script>
    let _sb, _currentLeadId;

    function calcConversionProbability(lead) {
        if (lead.status === 'closed_won') return 100;
        if (lead.status === 'closed_lost') return 0;
        let score = lead.status === 'active' ? 45 : 20;
        score += Math.round((50 - (lead.risk_score || 50)) * 0.4);
        if (lead.last_interaction_at) {
            const days = (Date.now() - new Date(lead.last_interaction_at)) / 86400000;
            if (days < 1) score += 20;
            else if (days < 3) score += 12;
            else if (days < 7) score += 5;
            else if (days > 21) score -= 10;
            else if (days > 14) score -= 5;
        }
        if (lead.phone) score += 8;
        if (lead.email) score += 5;
        return Math.min(99, Math.max(1, score));
    }

    // 1. Load Leads
    async function loadLeads(sb) {
        const { data: leads } = await sb.from('leads').select('*').order('last_contacted_at', { ascending: false });
        const listContainer = document.getElementById('lead-list-container');
        listContainer.innerHTML = '';

        if (leads && leads.length > 0) {
            leads.forEach(lead => {
                const prob = calcConversionProbability(lead);
                const probColor = prob >= 100 ? 'text-emerald-400' : prob > 60 ? 'text-green-400' : prob > 30 ? 'text-yellow-400' : 'text-red-400';
                const colorBase = prob >= 100 ? 'emerald' : prob > 60 ? 'green' : prob > 30 ? 'yellow' : 'red';
                const div = document.createElement('div');
                div.className = "p-4 border-b border-white/5 hover:bg-white/5 cursor-pointer flex justify-between items-center group transition";
                div.onclick = () => showDetail(lead);
                div.innerHTML = `
                    <div><h4 class="font-bold text-white text-sm group-hover:text-indigo-400">${lead.name}</h4><p class="text-xs text-slate-400 capitalize">${lead.status.replace('_',' ')}</p></div>
                    <div class="text-right"><span class="text-xs font-bold ${probColor} bg-${colorBase}-900/20 px-2 py-1 rounded">${prob}% Conv.</span></div>
                `;
                listContainer.appendChild(div);
            });
        } else {
            listContainer.innerHTML = '<div class="p-4 text-xs text-slate-500">No active leads found.</div>';
        }
    }

    // 2. Show Details
    async function showDetail(lead) {
        _currentLeadId = lead.id;
        document.getElementById('empty-state').classList.add('hidden');
        const view = document.getElementById('detail-view');
        view.classList.remove('hidden');
        view.classList.add('flex');

        document.getElementById('detail-name').innerText = lead.name;
        document.getElementById('detail-company').innerText = lead.email || lead.phone || 'No contact info';

        // Update conversion probability with real lead data
        const prob = calcConversionProbability(lead);
        document.getElementById('detail-score').innerText = prob + '%';

        const { data: chats } = await _sb.from('interactions').select('*').eq('lead_id', lead.id).order('created_at', { ascending: true });
        const container = document.getElementById('chat-history');
        container.innerHTML = '';

        if (chats && chats.length > 0) {
            chats.forEach(chat => {
                const isAI = chat.direction === 'outbound';
                const align = isAI ? 'self-end' : 'self-start';
                const color = isAI ? 'bg-indigo-900/30 border-indigo-500/20' : 'bg-slate-800 border-white/5';
                const div = document.createElement('div');
                div.className = 'flex flex-col space-y-1 mb-2';
                const bubble = document.createElement('div');
                bubble.className = `${color} ${align} p-3 rounded-2xl text-sm max-w-[70%] border text-slate-300`;
                bubble.textContent = chat.content || '';
                div.appendChild(bubble);
                container.appendChild(div);
            });
        } else {
            container.innerHTML = '<p class="text-slate-600 text-xs text-center pt-6">No conversation history yet.</p>';
        }
    }

    // 3. CRM Profile Modal
    async function openCRMProfile() {
        if (!_currentLeadId) return;
        const modal = document.getElementById('crm-modal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        document.getElementById('modal-body').innerHTML = '<p class="text-slate-500 text-sm text-center py-6">Loading...</p>';

        const [{ data: lead }, { data: timeline }] = await Promise.all([
            _sb.from('leads').select('*').eq('id', _currentLeadId).single(),
            _sb.from('lead_timeline_events').select('*').eq('lead_id', _currentLeadId).order('created_at', { ascending: false }).limit(20)
        ]);

        if (!lead) {
            document.getElementById('modal-body').innerHTML = '<p class="text-red-400 text-sm text-center py-6">Failed to load lead data.</p>';
            return;
        }

        document.getElementById('modal-name').innerText = lead.name || 'CRM Profile';

        const field = (label, value) => value
            ? `<div><p class="text-[10px] font-bold uppercase text-slate-500 mb-1">${label}</p><p class="text-sm text-white">${value}</p></div>`
            : '';

        const prob = calcConversionProbability(lead);
        const scoreColor = prob >= 100 ? 'text-emerald-400' : prob > 60 ? 'text-green-400' : prob > 30 ? 'text-yellow-400' : 'text-red-400';
        const statusBadge = `<span class="bg-slate-700 text-slate-300 text-[10px] font-bold px-2 py-0.5 rounded uppercase">${lead.status || 'unknown'}</span>`;

        const timelineHtml = (timeline && timeline.length > 0)
            ? timeline.map(ev => {
                const d = new Date(ev.created_at).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
                return `<div class="flex gap-3 items-start">
                    <div class="w-2 h-2 rounded-full bg-indigo-500 mt-1.5 flex-shrink-0"></div>
                    <div><p class="text-xs text-slate-300">${ev.description || ev.event_type || 'Event'}</p><p class="text-[10px] text-slate-500 mt-0.5">${d}</p></div>
                </div>`;
            }).join('')
            : '<p class="text-slate-500 text-xs">No timeline events yet.</p>';

        document.getElementById('modal-body').innerHTML = `
            <div class="grid grid-cols-2 gap-4 bg-slate-900/50 rounded-xl p-4 border border-white/5">
                ${field('Email', lead.email)}
                ${field('Phone', lead.phone)}
                ${field('Company', lead.company)}
                ${field('Source', lead.source)}
                <div><p class="text-[10px] font-bold uppercase text-slate-500 mb-1">Status</p>${statusBadge}</div>
                <div><p class="text-[10px] font-bold uppercase text-slate-500 mb-1">Conversion Probability</p><p class="text-sm font-bold ${scoreColor}">${prob}%</p></div>
                ${field('Last Contacted', lead.last_contacted_at ? new Date(lead.last_contacted_at).toLocaleString('en-IN') : null)}
                ${field('Lead Since', lead.created_at ? new Date(lead.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : null)}
                ${field('Notes', lead.notes)}
            </div>
            <div>
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Activity Timeline</h3>
                <div class="space-y-3">${timelineHtml}</div>
            </div>
        `;
    }

    function closeCRMProfile() {
        const modal = document.getElementById('crm-modal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    async function checkEntitlement(sb, user, serviceKey) {
        const { data: membership } = await sb.from('org_members').select('org_id').eq('user_id', user.id).limit(1).single();
        if (!membership) return false;
        const { data: service } = await sb.from('org_services').select('status').eq('org_id', membership.org_id).eq('service_key', serviceKey).maybeSingle();
        return service?.status === 'active';
    }

    requireAuth({
        onAuthenticated: async (profile, user, sb) => {
            const entitled = await checkEntitlement(sb, user, 'sentinel');
            if (!entitled) { window.location.href = 'billing.html?lock=sentinel'; return; }
            _sb = sb;
            loadLeads(sb);

            // Load SMS credit balance
            const { data: members } = await sb.from('org_members').select('org_id').eq('user_id', user.id).limit(1);
            const orgId = members?.[0]?.org_id;
            if (orgId) {
                await window.Credits.initCreditWallet(sb, orgId, { primaryTokenKey: 'sms_msg' });
                const bal = document.getElementById('sentinel-sms-count');
                const balCard = document.getElementById('sentinel-sms-balance');
                if (bal && window.Credits._wallets) {
                    const smsWallets = (await sb.from('credit_wallets').select('available_balance').eq('org_id', orgId).eq('token_key', 'sms_msg').limit(1)).data;
                    const smsBalance = smsWallets?.[0]?.available_balance ?? 0;
                    bal.textContent = Number(smsBalance).toLocaleString();
                    if (balCard) balCard.classList.remove('hidden'), balCard.style.display = 'flex';
                }
            }
        }
    });
</script>
</body>
</html>
