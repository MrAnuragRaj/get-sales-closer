<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="favicon.jpg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appt. Architect | GetSalesCloser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 h-screen text-white flex flex-col font-sans">

    <div id="auth-loader" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-50">
        <div class="h-10 w-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-3"></div>
        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Verifying Session...</p>
    </div>

    <div class="h-20 border-b border-white/5 bg-slate-900 flex items-center justify-between px-8">
        <h1 class="text-xl font-bold flex items-center gap-3">
            <i class="fa-regular fa-calendar-check text-indigo-500"></i> Appointment Architect
        </h1>
        <a href="dashboard.html" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-lg text-sm transition">
            <i class="fa-solid fa-arrow-left mr-2"></i>Dashboard
        </a>
    </div>

    <div class="flex-1 p-8 overflow-y-auto">
        <div class="max-w-6xl mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="appointments-grid">
               </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <script>
        async function loadAppointments(sb) {
            const { data: apts } = await sb
                .from('appointments')
                .select('*, leads(name)')
                .order('start_time', { ascending: true });

            const container = document.getElementById('appointments-grid');
            container.innerHTML = '';

            if (apts && apts.length > 0) {
                apts.forEach(apt => {
                    const d = new Date(apt.start_time);
                    const isToday = d.toDateString() === new Date().toDateString();
                    const div = document.createElement('div');
                    div.className = "bg-slate-800/50 p-6 rounded-2xl border border-white/5 hover:border-indigo-500/50 transition duration-300 group";
                    div.innerHTML = `
                        <div class="flex justify-between mb-4">
                            <span class="${isToday ? 'bg-indigo-600' : 'bg-slate-600'} text-white text-[10px] font-bold px-2 py-1 rounded">${isToday ? 'TODAY' : d.toLocaleDateString()}</span>
                            <span class="text-slate-400 text-xs font-mono">${d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                        </div>
                        <h3 class="font-bold text-white text-lg">${apt.title}</h3>
                        <p class="text-slate-400 text-sm mb-6">Lead: ${apt.leads?.name || 'Unknown'}</p>
                        <div class="flex items-center justify-between pt-4 border-t border-white/5">
                            <div class="flex flex-col"><span class="text-[10px] text-slate-500 uppercase font-bold">Status</span><span class="text-green-400 font-bold text-sm capitalize">${apt.status}</span></div>
                            <a href="${apt.meeting_link || '#'}" target="_blank" class="bg-indigo-600/20 text-indigo-300 hover:bg-indigo-600 hover:text-white px-4 py-2 rounded-lg text-sm font-medium transition"><i class="fa-solid fa-video mr-1"></i> Join</a>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } else {
                container.innerHTML = '<div class="col-span-3 text-center text-slate-500 mt-10">No scheduled appointments.</div>';
            }
        }

        async function checkEntitlement(sb, user, serviceKey) {
            const { data: membership } = await sb.from('org_members').select('org_id').eq('user_id', user.id).limit(1).single();
            if (!membership) return false;
            const { data: service } = await sb.from('org_services').select('status').eq('org_id', membership.org_id).eq('service_key', serviceKey).maybeSingle();
            return service?.status === 'active';
        }

        requireAuth({
            onAuthenticated: async (profile, user, sb) => {
                const entitled = await checkEntitlement(sb, user, 'architect');
                if (!entitled) { window.location.href = 'billing.html?lock=architect'; return; }
                loadAppointments(sb);
            }
        });
    </script>
</body>
</html>
